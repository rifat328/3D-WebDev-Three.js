<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line Drawing Effect</title>
    <style>
        svg{
            border: 1px solid red;
            width: 200px;
            height: 200px;
        background-color: #f0f0f0;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>
    <svg viewBox="0 0 100 100" >
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="1" fill="transparent" />

        <rect x="50" y="50" width="40" height="40" "/>
    </svg>
    <svg viewBox="0 0 100 100" style="border: 1px solid #ccc;"">
        <path d="M 50 10 L 90 90 L 10 90 Z" fill="none" stroke="blue" stroke-width="2" />
        <!-- stroke-dasharray and stroke-dashoffset -->
         
    </svg>
    <svg viewBox="0 0 100 100" style="border: 1px solid #ccc;"">
            <path d=" M 20 20 L 80 20 L 80 80  L 20 80 L 20 20 Z" fill="none" stroke="blue" stroke-width="2" />
    <!-- stroke-dasharray and stroke-dashoffset -->
    
    </svg>
</body>
</html>
